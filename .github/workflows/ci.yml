name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  docker-smoke-test:
    # Catches Dockerfile regressions here instead of first noticing them when
    # publish-images.yml runs on a merge to main. Dummy secrets -- this only
    # proves both containers build and boot to a healthy /healthz, not that
    # GitHub integration works (that needs a real App, covered by the manual
    # verification in docs/, not CI).
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Fake secrets for a boot-only smoke test
        run: |
          mkdir -p apps/backend/secrets
          echo "-----BEGIN RSA PRIVATE KEY-----
          not-a-real-key-just-needs-to-exist-for-readFileSync
          -----END RSA PRIVATE KEY-----" > apps/backend/secrets/github-app-private-key.pem

          cat > apps/backend/.env <<EOF
          DATABASE_URL=postgres://trustgate:trustgate@postgres:5432/trustgate
          REDIS_URL=redis://redis:6379
          RUNS_API_TOKEN=ci-smoke-test-token
          GITHUB_APP_ID=1
          GITHUB_APP_PRIVATE_KEY_PATH=apps/backend/secrets/github-app-private-key.pem
          GITHUB_WEBHOOK_SECRET=ci-smoke-test-secret
          EOF

          cat > apps/dashboard/.env <<EOF
          DATABASE_URL=postgres://trustgate:trustgate@postgres:5432/trustgate
          BETTER_AUTH_SECRET=$(openssl rand -hex 32)
          BETTER_AUTH_URL=http://localhost:3000
          GITHUB_APP_CLIENT_ID=ci-smoke-test
          GITHUB_APP_CLIENT_SECRET=ci-smoke-test
          BACKEND_URL=http://backend:3001
          BACKEND_API_TOKEN=ci-smoke-test-token
          EOF

      - name: Build and boot the stack
        run: docker compose -f deploy/docker-compose.yml up -d --build

      - name: Wait for backend health
        run: timeout 60 sh -c 'until curl -sf http://localhost:3001/healthz; do sleep 2; done'

      - name: Wait for dashboard
        run: timeout 60 sh -c 'until curl -sf -o /dev/null http://localhost:3000; do sleep 2; done'

      - name: Logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v
