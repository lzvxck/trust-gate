name: Publish Docker images

# Builds and pushes the backend/dashboard images to GHCR so self-hosters can
# `docker pull` a released image instead of cloning the repo and building from
# source (deploy/docker-compose.prod.yml consumes these tags). Not triggered on
# pull_request -- forked-PR builds shouldn't get package-write access, and every
# merge to main already produces a fresh `latest`.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: backend
            dockerfile: apps/backend/Dockerfile
          - image: dashboard
            dockerfile: apps/dashboard/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/trust-gate-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
