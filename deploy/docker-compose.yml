services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: trustgate
      POSTGRES_PASSWORD: trustgate
      POSTGRES_DB: trustgate
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trustgate']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ../apps/backend/.env
    environment:
      DATABASE_URL: postgres://trustgate:trustgate@postgres:5432/trustgate
      REDIS_URL: redis://redis:6379
      GITHUB_APP_PRIVATE_KEY_PATH: apps/backend/secrets/github-app-private-key.pem
    ports:
      - '3001:3001'
    volumes:
      - ../apps/backend/secrets:/app/apps/backend/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    env_file:
      - ../apps/dashboard/.env
    environment:
      DATABASE_URL: postgres://trustgate:trustgate@postgres:5432/trustgate
      BACKEND_URL: http://backend:3001
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
