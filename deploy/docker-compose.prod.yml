# Pulls released images from GHCR instead of building from source (see
# .github/workflows/publish-images.yml). Same env/volume layout as
# docker-compose.yml -- still needs apps/backend/.env, apps/dashboard/.env, and
# apps/backend/secrets/ populated per docs/01-github-app.md and
# docs/02-docker-compose.md, but skips the local `--build` step entirely.
#
# Usage: docker compose -f deploy/docker-compose.prod.yml up -d
# Pin a specific released version instead of latest:
#   TRUST_GATE_IMAGE_TAG=v0.1.0 docker compose -f deploy/docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: trustgate
      POSTGRES_PASSWORD: trustgate
      POSTGRES_DB: trustgate
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trustgate']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/lzvxck/trust-gate-backend:${TRUST_GATE_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ../apps/backend/.env
    environment:
      DATABASE_URL: postgres://trustgate:trustgate@postgres:5432/trustgate
      REDIS_URL: redis://redis:6379
      GITHUB_APP_PRIVATE_KEY_PATH: apps/backend/secrets/github-app-private-key.pem
    ports:
      - '3001:3001'
    volumes:
      - ../apps/backend/secrets:/app/apps/backend/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    image: ghcr.io/lzvxck/trust-gate-dashboard:${TRUST_GATE_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ../apps/dashboard/.env
    environment:
      DATABASE_URL: postgres://trustgate:trustgate@postgres:5432/trustgate
      BACKEND_URL: http://backend:3001
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
